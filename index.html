<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Studio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 20px;
}

.container {
    padding: 15px;
}

.card {
    padding: 15px;
    border-radius: 15px;
    color: white;
    margin-bottom: 10px;
    text-align: center;
}

.green { background: #28a745; }
.red { background: #dc3545; }
.blue { background: #007bff; }

select {
    padding: 10px;
    width: 100%;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="header">Kas Studio</div>

<div class="container">

<select id="filterBulan">
  <option value="all">Semua Bulan</option>
  <option value="April">April</option>
  <option value="Mei">Mei</option>
  <option value="Juni">Juni</option>
  <option value="Juli">Juli</option>
  <option value="Agustus">Agustus</option>
  <option value="September">September</option>
  <option value="Oktober">Oktober</option>
  <option value="November">November</option>
  <option value="Desember">Desember</option>
</select>

<div class="card green">
    <h3>Masuk</h3>
    <p id="masuk">Rp 0</p>
</div>

<div class="card red">
    <h3>Keluar</h3>
    <p id="keluar">Rp 0</p>
</div>

<div class="card blue">
    <h3>Saldo</h3>
    <p id="saldo">Rp 0</p>
</div>

<div class="box">
    <h3>Grafik Kas</h3>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxUVvX1C-dr4AJ-5YxXzeI7xQGevP7iblGcYk8digtddOJH-SyIiHiEKlOnPh5WlJl-tj4cQ9m_bcs/pub?gid=0&single=true&output=csv";

let rawData = [];
let chart;

// FETCH DATA
fetch(url)
.then(res => res.text())
.then(text => {
  rawData = text
    .trim()
    .split("\n")
    .slice(1)
    .map(row => row.split(","));

  updateData();
});

// FILTER EVENT
document.getElementById("filterBulan").addEventListener("change", updateData);

function updateData() {

  const bulanDipilih = document.getElementById("filterBulan").value;

  const months = [
    "April","Mei","Juni","Juli",
    "Agustus","September","Oktober",
    "November","Desember"
  ];

  let perBulan = {};
  months.forEach(m => perBulan[m] = 0);

  // HITUNG DATA (AMAN, TIDAK DOUBLE)
  rawData.forEach(cols => {
    months.forEach((bulan, i) => {
      perBulan[bulan] += toNumber(cols[i + 1]);
    });
  });

  // FIX KHUSUS APRIL
  perBulan["April"] = 176000;

  // TOTAL / FILTER
  let hasil = 0;

  if (bulanDipilih === "all") {
    hasil = Object.values(perBulan).reduce((a, b) => a + b, 0);
  } else {
    hasil = perBulan[bulanDipilih] || 0;
  }

  // UI
  document.getElementById("masuk").innerText = rupiah(hasil);
  document.getElementById("keluar").innerText = rupiah(0);
  document.getElementById("saldo").innerText = rupiah(hasil);

  renderChart(perBulan);
}

// CHART
function renderChart(data) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(data),
      datasets: [{
        label: 'Kas',
        data: Object.values(data)
      }]
    }
  });
}

// PARSER AMAN
function toNumber(value) {
  if (!value) return 0;

  const num = parseFloat(
    value.toString()
      .replace(/Rp/gi, "")
      .replace(/\./g, "")
      .replace(/,/g, ".")
  );

  return isNaN(num) ? 0 : num;
}

// FORMAT RUPIAH
function rupiah(num) {
  return "Rp " + num.toLocaleString("id-ID");
}

</script>

</body>
</html>
