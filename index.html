<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas studio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

.header {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 20px;
}

.container {
    padding: 15px;
}

.card {
    padding: 15px;
    border-radius: 15px;
    color: white;
    margin-bottom: 10px;
    text-align: center;
}

.green { background: #28a745; }
.red { background: #dc3545; }
.blue { background: #007bff; }

select {
    padding: 10px;
    width: 100%;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="header">\Kas Studio</div>

<div class="container">

<select id="filterBulan">
  <option value="all">Semua Bulan</option>
  <option>April</option>
  <option>Mei</option>
  <option>Juni</option>
  <option>Juli</option>
  <option>Agustus</option>
  <option>September</option>
  <option>Oktober</option>
  <option>November</option>
  <option>Desember</option>
</select>

<div class="card green">
    <h3>Masuk</h3>
    <p id="masuk">Rp 176.000</p>
</div>

<div class="card red">
    <h3>Keluar</h3>
    <p id="keluar">Rp 176.000</p>
</div>

<div class="card blue">
    <h3>Saldo</h3>
    <p id="saldo">Rp 0</p>
</div>

<div class="box">
    <h3>Grafik Kas</h3>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxUVvX1C-dr4AJ-5YxXzeI7xQGevP7iblGcYk8digtddOJH-SyIiHiEKlOnPh5WlJl-tj4cQ9m_bcs/pub?output=csv";

let rawData = [];
let chart;

// ambil data
fetch(url)
.then(res => res.text())
.then(text => {
  rawData = text.split("\n").slice(1).map(row => row.split(","));
  updateData();
});

// event filter
document.getElementById("filterBulan").addEventListener("change", updateData);

function updateData() {
  const bulanDipilih = document.getElementById("filterBulan").value;

  let total = 0;
  let perBulan = {
    April:176.000, Mei:0, Juni:0, Juli:0,
    Agustus:0, September:0, Oktober:0,
    November:0, Desember:0
  };

  rawData.forEach(cols => {
    const bulanList = Object.keys(perBulan);

    bulanList.forEach((bulan, i) => {
      let value = toNumber(cols[i+1]); // kolom bulan

      if (bulanDipilih === "all" || bulanDipilih === bulan) {
        total += value;
      }

      perBulan[bulan] += value;
    });
  });

  document.getElementById("masuk").innerText = rupiah(total);
  document.getElementById("keluar").innerText = rupiah(0);
  document.getElementById("saldo").innerText = rupiah(total);

  renderChart(perBulan, bulanDipilih);
}

// chart
function renderChart(data, filter) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: filter === "all" ? Object.keys(data) : [filter],
      datasets: [{
        label: 'Kas',
        data: filter === "all"
          ? Object.values(data)
          : [data[filter]]
      }]
    }
  });
}

// parser anti NaN
function toNumber(value) {
  if (!value) return 0;

  return parseFloat(
    value
      .replace(/Rp/gi, "")
      .replace(/\./g, "")
      .replace(/,/g, ".")
  ) || 0;
}

// format rupiah
function rupiah(angka) {
  return "Rp " + angka.toLocaleString("id-ID");
}

</script>

</body>
</html>
