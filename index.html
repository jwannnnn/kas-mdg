<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Kas Kantor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-weight: 600; }
        
        /* Container Utama */
        .container { max-width: 1100px; margin: auto; }

        /* Styling Kartu Ringkasan (Summary Cards) */
        .summary-container { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-width: 250px; text-align: center; border-left: 5px solid; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5s); }
        .card-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .card-value { font-size: 28px; font-weight: 600; }
        
        /* Warna Kartu */
        .card-pemasukan { border-left-color: #2ecc71; color: #2ecc71; }
        .card-pengeluaran { border-left-color: #e74c3c; color: #e74c3c; }
        .card-saldo { border-left-color: #3498db; color: #3498db; }

        /* Styling Tabel */
        .data-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 18px; margin-bottom: 20px; color: #555; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background-color: #f8f9fa; border-bottom: 2px solid #eee; color: #777; font-weight: 600; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #fafafa; }

        /* Styling Badge Tipe (Masuk/Keluar) */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-masuk { background-color: #eafaf1; color: #2ecc71; }
        .badge-keluar { background-color: #fdedec; color: #e74c3c; }

        /* Tampilan Loading */
        .loading { text-align: center; font-style: italic; color: #888; padding: 20px; }

        /* Responsive untuk HP */
        @media (max-width: 768px) {
            .summary-container { flex-direction: column; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #ccc; margin-bottom: 10px; }
            td { border: none; border-bottom: 1px solid #eee; position: relative; padding-left: 50%; text-align: right; }
            td:before { position: absolute; top: 6px; left: 6px; width: 45%; padding-right: 10px; white-space: nowrap; text-align: left; font-weight: bold; color: #777; }
            td:nth-of-type(1):before { content: "Tanggal"; }
            td:nth-of-type(2):before { content: "Keterangan"; }
            td:nth-of-type(3):before { content: "Tipe"; }
            td:nth-of-type(4):before { content: "Nominal"; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard Monitoring Kas</h1>

    <div class="summary-container">
        <div class="card card-pemasukan">
            <span class="card-title">Total Pemasukan</span>
            <span class="card-value" id="total-masuk">Rp 0</span>
        </div>
        <div class="card card-pengeluaran">
            <span class="card-title">Total Pengeluaran</span>
            <span class="card-value" id="total-keluar">Rp 0</span>
        </div>
        <div class="card card-saldo">
            <span class="card-title">Saldo Saat Ini</span>
            <span class="card-value" id="total-saldo">Rp 0</span>
        </div>
    </div>

    <div class="data-container">
        <h2>Riwayat Transaksi Terbaru</h2>
        <div id="display-data">
            <p class="loading">Mengambil data real-time...</p>
        </div>
    </div>
</div>

<script>
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxUVvX1C-dr4AJ-5YxXzeI7xQGevP7iblGcYk8digtddOJH-SyIiHiEKlOnPh5WlJl-tj4cQ9m_bcs/pub?gid=0&single=true&output=csv';

    // Fungsi untuk memformat angka menjadi Rupiah (Rp)
    function formatRupiah(angka) {
        return "Rp " + parseInt(angka).toLocaleString('id-ID');
    }

    async function fetchData() {
        try {
            const response = await fetch(url);
            const data = await response.text();
            
            // Parsing CSV menjadi Array
            const rows = data.split('\n').filter(row => row.trim() !== ''); // Hapus baris kosong
            const header = rows[0].split(','); // Baris pertama adalah judul kolom
            const transactions = rows.slice(1); // Mulai dari baris kedua

            let tMasuk = 0;
            let tKeluar = 0;
            let tableHtml = '<table><thead><tr><th>Tanggal</th><th>Keterangan</th><th>Tipe</th><th>Nominal</th></tr></thead><tbody>';

            // Looping setiap baris transaksi
            transactions.forEach(row => {
                // Gunakan regex untuk menghandle koma di dalam teks (misal: "Beli ATK, Kertas")
                const columns = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                
                if (columns && columns.length >= 4) {
                    const tanggal = columns[0].replace(/"/g, '');
                    const keterangan = columns[1].replace(/"/g, '');
                    const tipe = columns[2].replace(/"/g, '').trim().toLowerCase(); // 'masuk' atau 'keluar'
                    const nominalText = columns[3].replace(/"/g, '').replace(/[^\d]/g, ''); // Ambil angkanya saja
                    const nominal = parseInt(nominalText) || 0;

                    let badgeClass = '';
                    let tipeText = '';
                    let nominalFormated = '';

                    // Hitung total dan atur tampilan berdasarkan tipe
                    if (tipe === 'masuk') {
                        tMasuk += nominal;
                        badgeClass = 'badge badge-masuk';
                        tipeText = 'Masuk ↑';
                        nominalFormated = `+ ${formatRupiah(nominal)}`;
                    } else if (tipe === 'keluar') {
                        tKeluar += nominal;
                        badgeClass = 'badge badge-keluar';
                        tipeText = 'Keluar ↓';
                        nominalFormated = `- ${formatRupiah(nominal)}`;
                    }

                    // Tambahkan baris ke tabel
                    tableHtml += `<tr>
                        <td>${tanggal}</td>
                        <td style="font-weight:600;">${keterangan}</td>
                        <td><span class="${badgeClass}">${tipeText}</span></td>
                        <td style="font-weight:600; ${tipe === 'masuk' ? 'color:#2ecc71;' : 'color:#e74c3c;'}">${nominalFormated}</td>
                    </tr>`;
                }
            });

            tableHtml += '</tbody></table>';
            
            // Update Ringkasan (Summary)
            document.getElementById('total-masuk').innerText = formatRupiah(tMasuk);
            document.getElementById('total-keluar').innerText = formatRupiah(tKeluar);
            document.getElementById('total-saldo').innerText = formatRupiah(tMasuk - tKeluar);

            // Update Tabel
            document.getElementById('display-data').innerHTML = tableHtml;

        } catch (error) {
            console.error(error);
            document.getElementById('display-data').innerHTML = "<p class='loading'>Gagal memuat data. Pastikan link CSV benar.</p>";
        }
    }

    // Jalankan pertama kali
    fetchData();
    // Refresh otomatis setiap 60 detik agar data selalu terbaru (real-time)
    setInterval(fetchData, 60000); 
</script>

</body>
</html>
